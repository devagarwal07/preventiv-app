route:
  receiver: default
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 30m

receivers:
  - name: default
    email_configs:
      - to: ${ALERT_EMAIL_TO}
        from: ${ALERT_EMAIL_FROM}
        smarthost: ${ALERT_SMTP_HOST}:${ALERT_SMTP_PORT}
        auth_username: ${ALERT_SMTP_USER}
        auth_password: ${ALERT_SMTP_PASSWORD}
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#prevntiv-alerts"
        title: "Prevntiv Monitoring Alert"
