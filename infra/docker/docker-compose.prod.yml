version: "3.9"

name: prevntiv-prod

x-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - prevntiv-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 8
    networks: [ prevntiv-net ]
    logging: *json-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - prevntiv-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 8
    networks: [ prevntiv-net ]
    logging: *json-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ../../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - prevntiv-minio-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 8
    networks: [ prevntiv-net ]
    logging: *json-logging

  api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      AI_ENGINE_URL: http://ai-engine:8000
      NOTIFICATION_SERVICE_URL: http://notification:3002
      NODE_ENV: production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    networks: [ prevntiv-net ]
    logging: *json-logging

  ai-engine:
    build:
      context: ../../
      dockerfile: services/ai-engine/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8000/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    networks: [ prevntiv-net ]
    logging: *json-logging

  notification:
    build:
      context: ../../
      dockerfile: services/notification/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3002/health" ]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [ prevntiv-net ]
    logging: *json-logging

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.prevntiv.com
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000" ]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [ prevntiv-net ]
    logging: *json-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost" ]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [ prevntiv-net ]
    logging: *json-logging

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks: [ prevntiv-net ]
    logging: *json-logging

volumes:
  prevntiv-postgres-data:
  prevntiv-minio-data:
  prevntiv-redis-data:
  certbot-etc:
  certbot-var:
  certbot-www:


networks:
  prevntiv-net:
    driver: bridge
