version: "3.9"

name: prevntiv-dev

services:
  postgres:
    image: postgres:15
    container_name: prevntiv-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - prevntiv-postgres-data:/var/lib/postgresql/data
      - ../../infra/postgres/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prevntiv-net

  redis:
    image: redis:7-alpine
    container_name: prevntiv-redis
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prevntiv-net

  minio:
    image: minio/minio:latest
    container_name: prevntiv-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - prevntiv-minio-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prevntiv-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; mc mb --ignore-existing local/lab-reports; mc mb --ignore-existing local/avatars; exit 0; "
    networks:
      - prevntiv-net

  api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile.dev
    container_name: prevntiv-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_PORT: 3001
      AI_ENGINE_URL: http://ai-engine:8000
      NOTIFICATION_SERVICE_URL: http://notification:3002
      MINIO_ENDPOINT: minio
    volumes:
      - ../../:/workspace
      - /workspace/node_modules
    networks:
      - prevntiv-net

  ai-engine:
    build:
      context: ../../
      dockerfile: services/ai-engine/Dockerfile.dev
    container_name: prevntiv-ai-engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AI_ENGINE_PORT: 8000
    volumes:
      - ../../services/ai-engine:/app
    networks:
      - prevntiv-net

  notification:
    image: node:20-alpine
    container_name: prevntiv-notification
    working_dir: /workspace/services/notification
    command: sh -c "npm install && npm run dev"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"
    env_file:
      - ../../.env.example
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NOTIFICATION_PORT: 3002
    volumes:
      - ../../:/workspace
    networks:
      - prevntiv-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prevntiv-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prevntiv-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: prevntiv-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - prevntiv-net

volumes:
  prevntiv-postgres-data:
  prevntiv-minio-data:


networks:
  prevntiv-net:
    driver: bridge
